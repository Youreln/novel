<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中梧小说</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" href="favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --bg:#f4ecd8;--card:rgba(251,246,237,0.75);--text:#5b4636;--sub:#8b7355;
    --accent:#5e72e4;--accent-light:rgba(94,114,228,0.12);--border:rgba(230,220,200,0.6);
    --shadow:0 6px 22px rgba(0,0,0,0.06);--radius-lg:24px;--radius-md:16px;--radius-pill:9999px;--blur:14px;
    --reader-bg:#fbf6ed;--reader-text:#5b4636;
    --transition-base:0.3s ease;--transition-hover:0.4s ease;
}
[data-theme="light"]{--bg:#f4f6f9;--card:rgba(255,255,255,0.72);--text:#333;--sub:#666;--border:rgba(238,238,238,0.7);--reader-bg:#fff;--reader-text:#333;}
[data-theme="dark"]{--bg:#121212;--card:rgba(45,45,45,0.7);--text:#e0e0e0;--sub:#aaa;--border:rgba(68,68,68,0.6);--reader-bg:#202020;--reader-text:#d0d0d0;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;background:var(--bg);color:var(--text);padding:16px;transition:var(--transition-base)}
.container{max-width:920px;margin:0 auto}
/* 顶部导航优化 */
.top-nav{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;padding:20px 24px;margin-bottom:24px;background:var(--card);border-radius:var(--radius-lg);backdrop-filter:blur(var(--blur));box-shadow:var(--shadow);border:1px solid var(--border);transition:var(--transition-base)}
.nav-brand h1{display:flex;align-items:center;gap:8px;font-size:1.6rem;color:var(--accent);font-weight:700}
.nav-links{display:flex;gap:12px;flex-wrap:wrap}
.nav-links a{text-decoration:none;color:var(--sub);font-size:0.88rem;padding:9px 18px;border:1px solid var(--border);border-radius:var(--radius-pill);display:flex;gap:7px;align-items:center;transition:var(--transition-hover)}
.nav-links a:hover{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 16px rgba(94,114,228,0.35);transform:translateY(-2px)}
/* 搜索栏优化 */
.search-bar{width:100%;margin-bottom:16px;display:flex;gap:10px;align-items:center}
#searchInput{flex:1;padding:12px 20px;border:1px solid var(--border);border-radius:var(--radius-pill);background:var(--card);color:var(--text);font-size:0.95rem;outline:none;transition:var(--transition-base)}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
#searchBtn{padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-pill);cursor:pointer;transition:var(--transition-hover);font-weight:500}
#searchBtn:hover{background:#4a61d0;box-shadow:0 4px 12px rgba(94,114,228,0.4)}
/* 模式操作栏优化 */
.mode-action-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:20px}
.mode-btn,.sort-select,.setting-btn,.theme-btn,.page-btn{
    padding:10px 20px;border:1px solid var(--border);border-radius:14px !important;
    background:transparent;color:var(--text);cursor:pointer;font-size:0.88rem;transition:var(--transition-hover);font-weight:500
}
.mode-btn:hover,.setting-btn:hover,.theme-btn:hover,.page-btn:hover{background:var(--accent-light);transform:translateY(-1px)}
.mode-btn.active,.setting-btn.active,.theme-btn.active,.page-btn.active{
    background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(94,114,228,0.32)
}
/* 操作按钮优化 */
.action-bar{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.action-bar .btn-write,.action-bar .btn-setting{
    display:inline-flex;align-items:center;gap:8px;color:#fff;padding:13px 28px;border-radius:var(--radius-pill);text-decoration:none;font-size:0.98rem;font-weight:600;box-shadow:0 6px 16px rgba(94,114,228,0.35);border:none;cursor:pointer;transition:var(--transition-hover)
}
.btn-write{background:var(--accent)}
.btn-setting{background:#7286e9}
.btn-write:hover,.btn-setting:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(94,114,228,0.42);color:#fff;opacity:0.95}
/* 状态和加载动画优化 */
.status{text-align:center;color:var(--sub);padding:10px;margin-bottom:20px;font-size:0.95rem}
.loader{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:24px auto;animation:spin 1s linear infinite;position:relative}
.loader::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:var(--accent);border-radius:50%}
@keyframes spin{to{transform:rotate(360deg)}}
/* 小说网格和卡片优化 */
.novel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px;margin-bottom:32px}
.book-group-title{grid-column:1/-1;margin:16px 0 12px;font-size:1.3rem;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.novel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:24px;cursor:pointer;transition:all var(--transition-hover);backdrop-filter:blur(var(--blur));position:relative;overflow:hidden}
.novel-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:4px;background:var(--accent);transform:scaleX(0);transition:transform var(--transition-hover);transform-origin:left}
.novel-card:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(0,0,0,0.12);border-color:var(--accent);}
.novel-card:hover::before{transform:scaleX(1)}
.card-book-tag{font-size:0.78rem;color:var(--accent);margin-bottom:6px;font-weight:500}
.novel-title{font-size:1.18rem;font-weight:600;margin-bottom:8px;line-height:1.4}
.novel-author{font-size:0.82rem;color:var(--sub);margin-bottom:12px}
.novel-meta{font-size:0.86rem;color:var(--sub);padding-top:12px;border-top:1px solid var(--border);opacity:0.8}
/* 阅读视图优化 */
#reader-view{display:none;background:var(--reader-bg);padding:32px;border-radius:var(--radius-lg);box-shadow:var(--shadow);backdrop-filter:blur(var(--blur));border:1px solid var(--border);margin-top:20px}
.reader-title{font-size:1.8rem;font-weight:700;color:var(--accent);text-align:center;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);line-height:1.5}
.reader-m{text-align:center;color:var(--sub);margin-bottom:24px;line-height:1.6;font-size:0.95rem}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--accent);padding:10px 20px;border-radius:14px;cursor:pointer;margin-bottom:24px;font-size:1rem;transition:var(--transition-hover)}
.back-btn:hover{background:var(--accent);color:#fff;transform:translateY(-2px)}
/* 设置面板优化 */
.settings-panel{display:flex;flex-wrap:wrap;gap:16px;padding:20px 24px;background:rgba(0,0,0,0.03);border-radius:var(--radius-md);margin-bottom:28px;border:1px solid var(--border);align-items:center}
.settings-panel span{color:var(--sub);font-size:0.94rem;white-space:nowrap}
#content-area{line-height:1.8;word-break:break-word;padding:16px 8px;min-height:400px;color:var(--reader-text);font-size:18px;border-radius:var(--radius-md);background:transparent}
#content-area h1,#content-area h2,#content-area h3{color:var(--accent);margin:16px 0 8px}
#content-area p{margin-bottom:12px;line-height:inherit}
#content-area pre{background:rgba(0,0,0,0.05);padding:16px;border-radius:8px;margin:12px 0;overflow-x:auto}
#content-area code{background:rgba(0,0,0,0.05);padding:2px 6px;border-radius:4px}
/* 分页控制优化 */
.page-control{display:flex;gap:16px;justify-content:center;align-items:center;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.page-info{color:var(--sub);font-size:0.95rem}
/* 模态框优化 */
.set-modal{
    position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);
}
.set-box{
    width:92%;max-width:600px;background:var(--card);border-radius:var(--radius-lg);padding:32px;border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,0.18);transition:var(--transition-base);transform:translateY(-10px);opacity:0;animation:modalFadeIn 0.3s forwards;
}
@keyframes modalFadeIn {
    to {transform:translateY(0);opacity:1}
}
.set-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.set-header h2{margin:0;color:var(--accent);font-weight:700}
.close-set{border:none;background:transparent;font-size:1.8rem;cursor:pointer;color:var(--sub);width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:var(--transition-base)}
.close-set:hover{background:var(--accent-light);color:var(--accent)}
.set-item{margin-bottom:24px}
.set-item label{display:block;margin-bottom:8px;color:var(--sub);font-weight:500}
.set-item select,.set-item input{
    width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;background:transparent;color:var(--text);font-size:0.95rem;transition:var(--transition-base)
}
.set-item select:focus,.set-item input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);outline:none}
.save-set{margin-top:8px;width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:1rem;cursor:pointer;transition:var(--transition-hover);font-weight:600}
.save-set:hover{background:#4a61d0;transform:translateY(-2px);box-shadow:0 6px 16px rgba(94,114,228,0.4)}
/* 错误提示优化 */
.error-msg{color:#e74c3c;background:rgba(231,76,60,0.1);padding:16px 20px;border-radius:12px;margin-bottom:20px;text-align:center;display:none;border:1px solid rgba(231,76,60,0.2);font-weight:500}
/* 响应式优化 */
@media(max-width:768px){
    body{padding:12px}
    .top-nav{flex-direction:column;text-align:center;padding:16px 20px}
    .mode-action-bar{flex-direction:column;align-items:stretch}
    .novel-grid{grid-template-columns:repeat(auto-fill,minmax(100%,1fr));gap:16px}
    #reader-view{padding:20px 16px}
    .settings-panel{gap:12px;padding:16px}
    .set-box{padding:24px}
    .action-bar{width:100%;justify-content:center}
    .btn-write,.btn-setting{width:100%;justify-content:center}
}
</style>
</head>

<script>
const GH_USER = "Youreln";
const GH_REPO = "novel";
const GH_BRANCH = "main";
const GH_API = "https://api.github.com/repos";
const CDN_PREFIX = `https://cdn.jsdelivr.net/gh/${GH_USER}/${GH_REPO}@${GH_BRANCH}/`;
const MAX_CONCURRENT = 6; // 最大并发6

let allNovel = [];
let filterNovel = [];
let sortOrder = [];
let viewMode = "book";
let sortMode = "custom";
let fontSize = 18;
let lineH = 1.8;
let theme = "sepia";
let readMode = "scroll";
let pageWord = 1200;
let pageList = [];
let curPageIdx = 0;

const globalSet = JSON.parse(localStorage.getItem("novelGlobalSet")) || {
    defFont:18,defLH:1.8,defTheme:"sepia",defSort:"custom",defView:"book",defWord:1200
};

// DOM缓存
const listEl = document.getElementById("novel-list");
const status = document.getElementById("status-msg");
const loader = document.getElementById("loader");
const reader = document.getElementById("reader-view");
const contentBox = document.getElementById("content-area");
const rTitle = document.getElementById("r-title");
const rMeta = document.getElementById("r-meta");
const sortSel = document.getElementById("sortType");
const searchInput = document.getElementById("searchInput");
const setModal = document.getElementById("setModal");
const pageCtrl = document.getElementById("pageCtrl");
const curPageDom = document.getElementById("curPage");
const totalPageDom = document.getElementById("totalPage");
const pageWordInput = document.getElementById("pageWord");
const errorEl = document.getElementById("error-msg");

function stripMeta(txt){
    return txt.replace(/<!-- ZW_META:\s*(\{[\s\S]*?\})\s* -->\n\n/g,"");
}
function showErr(msg){
    errorEl.textContent = msg;
    errorEl.style.display = "block";
    loader.style.display = "none";
    status.style.display = "none";
}
function hideErr(){
    errorEl.style.display = "none";
}

// 批量并发控制器（限制最大并发6）
async function batchFetch(tasks, limit=MAX_CONCURRENT) {
    const results = [];
    let index = 0;
    async function worker(){
        while(index < tasks.length){
            const i = index++;
            try{
                const res = await tasks[i]();
                results[i] = res;
            }catch(e){
                results[i] = null;
                console.warn("任务失败", tasks[i], e);
            }
        }
    }
    const workers = Array.from({length:limit}, worker);
    await Promise.all(workers);
    return results;
}

// 单次重试请求
async function fetchWithRetry(url, retries=3, delay=1000) {
    try {
        const resp = await fetch(url);
        if (resp.status === 403 && resp.headers.get('X-RateLimit-Remaining') === '0') {
            const reset = new Date(+resp.headers.get('X-RateLimit-Reset') * 1000).toLocaleString();
            throw new Error(`Github API限流，重置时间：${reset}`);
        }
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return resp;
    } catch (err) {
        if(retries > 0){
            await new Promise(r=>setTimeout(r, delay));
            return fetchWithRetry(url, retries-1, delay*2);
        }
        throw err;
    }
}

// 文件过滤：仅md/txt
function isTextFile(name){
    const low = name.toLowerCase();
    return low.endsWith(".md") || low.endsWith(".txt");
}

// 1. Trees API一次性拉取全仓库文件树
async function getRepoTree(){
    const url = `${GH_API}/${GH_USER}/${GH_REPO}/git/trees/${GH_BRANCH}?recursive=1`;
    const resp = await fetchWithRetry(url);
    const json = await resp.json();
    if(json.truncated) console.warn("文件树被截断，仓库文件过多");
    return json.tree || [];
}

// 2. CDN读取sort.json，不再走API
async function loadSortJson(){
    try{
        const sortUrl = CDN_PREFIX + encodeURIComponent("novel/sort.json");
        const resp = await fetch(sortUrl);
        if(!resp.ok) return [];
        const raw = await resp.text();
        const data = JSON.parse(raw);
        if(Array.isArray(data.order)){
            return data.order.map(p=>decodeURIComponent(p));
        }
        return [];
    }catch(e){
        console.log("无sort.json配置",e);
        return [];
    }
}

// 解析元数据
function parseMeta(raw,filePath){
    const reg = /<!-- ZW_META:\s*(\{[\s\S]*?\})\s* -->/;
    const m = raw.match(reg);
    let meta = {title:"",author:"",book:"未分类"};
    if(m){
        try{
            meta = JSON.parse(m[1]);
        }catch(e){}
    }
    const seg = filePath.replace("novel/","").split("/");
    if(seg.length >=2 && !meta.book) meta.book = seg[0];
    return meta;
}

// 主加载流程
async function loadAllData(){
    hideErr();
    loader.style.display = "block";
    status.textContent = "加载sort.json配置...";
    sortOrder = await loadSortJson();

    status.textContent = "获取仓库文件树(Trees API)";
    const tree = await getRepoTree();
    // 筛选novel目录下文本文件，过滤隐藏文件、sort.json
    const fileList = tree.filter(item=>{
        const p = decodeURIComponent(item.path);
        const fn = decodeURIComponent(item.name);
        return item.type === "blob"
            && p.startsWith("novel/")
            && !fn.startsWith(".")
            && fn !== "sort.json"
            && isTextFile(fn);
    });
    if(fileList.length === 0){
        status.textContent = "未找到小说文件";
        loader.style.display = "none";
        return;
    }

    // 构造批量读取任务，使用CDN地址替代download_url
    const tasks = fileList.map(node=>async ()=>{
        const filePath = decodeURIComponent(node.path);
        const cdnUrl = CDN_PREFIX + encodeURIComponent(filePath);
        const name = decodeURIComponent(node.name);
        try{
            const txtResp = await fetch(cdnUrl);
            if(!txtResp.ok) return null;
            const rawTxt = await txtResp.text();
            const meta = parseMeta(rawTxt, filePath);
            const cleanTxt = stripMeta(rawTxt);
            return {
                path: filePath,
                name: name,
                cdnUrl: cdnUrl,
                title: meta.title || name.replace(/\.(md|txt)$/i,""),
                author: meta.author || "未知作者",
                book: meta.book,
                raw: cleanTxt,
                modifyTs: Date.now()
            }
        }catch(e){
            console.warn("读取文件失败",filePath,e);
            return null;
        }
    });

    status.textContent = `批量加载文件(并发${MAX_CONCURRENT})...`;
    const rawResult = await batchFetch(tasks, MAX_CONCURRENT);
    allNovel = rawResult.filter(Boolean);
    filterNovel = [...allNovel];

    loader.style.display = "none";
    status.style.display = "none";
    render();
}

window.onload = ()=>{
    hideErr();
    fontSize = globalSet.defFont;
    lineH = globalSet.defLH;
    theme = globalSet.defTheme;
    sortMode = globalSet.defSort;
    viewMode = globalSet.defView;
    pageWord = globalSet.defWord;
    pageWordInput.value = pageWord;
    sortSel.value = sortMode;

    document.getElementById("defFont").value = globalSet.defFont;
    document.getElementById("defLH").value = globalSet.defLH;
    document.getElementById("defTheme").value = globalSet.defTheme;
    document.getElementById("defSort").value = globalSet.defSort;
    document.getElementById("defView").value = globalSet.defView;
    document.getElementById("defWord").value = globalSet.defWord;

    document.body.dataset.theme = theme;
    contentBox.style.fontSize = fontSize + "px";
    contentBox.style.lineHeight = lineH;
    
    bindSortChange();
    bindSearchEnter();
    renderModeBtn();
    
    loadAllData().catch(e=>showErr("加载书架失败："+e.message));
}

function bindSortChange(){
    sortSel.onchange = ()=>{
        sortMode = sortSel.value;
        render();
    }
}
function bindSearchEnter(){
    searchInput.addEventListener("keydown",e=>{
        if(e.key==="Enter") doSearch();
    })
}
function renderModeBtn(){
    document.querySelectorAll(".mode-btn").forEach(b=>{
        b.classList.toggle("active", b.getAttribute("onclick").includes(`'${viewMode}'`));
    });
    document.querySelectorAll(".setting-btn[data-read]").forEach(b=>{
        b.classList.toggle("active", b.dataset.read===readMode);
    });
    document.querySelectorAll(".lh").forEach(b=>{
        b.classList.toggle("active", +b.dataset.lh===lineH);
    });
    document.querySelectorAll(".theme-btn").forEach(b=>{
        b.classList.toggle("active", b.dataset.t===theme);
    });
}
function openSetModal(){ setModal.style.display="flex"; }
function closeSetModal(){ setModal.style.display="none"; }
function saveGlobalSet(){
    try {
        const s = {
            defFont:+document.getElementById("defFont").value,
            defLH:+document.getElementById("defLH").value,
            defTheme:document.getElementById("defTheme").value,
            defSort:document.getElementById("defSort").value,
            defView:document.getElementById("defView").value,
            defWord:+document.getElementById("defWord").value
        };
        localStorage.setItem("novelGlobalSet",JSON.stringify(s));
        alert("设置保存成功，刷新页面生效");
        closeSetModal();
    } catch (e) {
        showErr("保存设置失败：" + e.message);
    }
}
function switchReadMode(mode,btn){
    readMode = mode;
    renderModeBtn();
    const rawContent = contentBox.innerText || contentBox.innerHTML.replace(/<[^>]+>/g, '');
    if(mode==="page"){
        splitPage(rawContent);
        pageCtrl.style.display="flex";
    }else{
        pageCtrl.style.display="none";
        curPageIdx=0;
    }
}
function splitPage(rawText){
    try {
        const wordNum = Math.max(400, Math.min(3000, +pageWordInput.value || 1200));
        pageList = [];
        let temp = "";
        let count = 0;
        const cleanText = rawText.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
        for(let c of cleanText){
            temp += c;
            count++;
            if(count >= wordNum){
                pageList.push(temp);
                temp = "";
                count=0;
            }
        }
        if(temp) pageList.push(temp);
        curPageIdx = 0;
        renderPage();
    } catch (e) {
        showErr("分页处理失败：" + e.message);
    }
}
function renderPage(){
    if(pageList.length===0){
        contentBox.innerText="暂无内容";
        return;
    }
    curPageIdx = Math.max(0, Math.min(curPageIdx, pageList.length - 1));
    contentBox.innerText = pageList[curPageIdx];
    curPageDom.textContent = curPageIdx+1;
    totalPageDom.textContent = pageList.length;
}
function prevPage(){
    if(curPageIdx>0){ curPageIdx--; renderPage(); }
}
function nextPage(){
    if(curPageIdx < pageList.length - 1){ curPageIdx++; renderPage(); }
}
function switchView(mode){
    viewMode = mode;
    renderModeBtn();
    render();
}
function doSearch(){
    const key = searchInput.value.trim().toLowerCase();
    hideErr();
    if(!key){
        filterNovel=[...allNovel];
        render();
        return;
    }
    filterNovel = allNovel.filter(item=>{
        return item.title.toLowerCase().includes(key)
        || item.author.toLowerCase().includes(key)
        || item.book.toLowerCase().includes(key)
        || item.raw.toLowerCase().includes(key);
    });
    render();
}
function resetSearch(){
    searchInput.value="";
    filterNovel=[...allNovel];
    render();
}
function render(){
    listEl.innerHTML = "";
    let data = [...filterNovel];
    if(sortMode === "custom"){
        const ord=[],rest=[];
        sortOrder.forEach(p=>{
            const hit = data.find(x=>x.path===p);
            if(hit) ord.push(hit);
        });
        data.forEach(x=>{if(!ord.find(i=>i.path===x.path)) rest.push(x)});
        data = [...ord,...rest];
    }else if(sortMode === "name"){
        data.sort((a,b)=>a.name.localeCompare(b.name, 'zh-CN'));
    }else if(sortMode === "time"){
        data.sort((a,b)=>b.modifyTs - a.modifyTs);
    }
    if(data.length === 0){
        listEl.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--sub)">
                <i class="fa-solid fa-book-open-reader" style="font-size:4rem;margin-bottom:16px;opacity:0.5"></i>
                <div style="font-size:1.1rem;margin-bottom:8px">无匹配小说</div>
                <div style="font-size:0.9rem">请尝试调整搜索关键词或筛选条件</div>
            </div>
        `;
        return;
    }
    if(viewMode === "book"){
        const map = {};
        data.forEach(i=>{
            if(!map[i.book]) map[i.book] = [];
            map[i.book].push(i);
        });
        Object.keys(map).forEach(bk=>{
            const div = document.createElement("div");
            div.className="book-group-title";
            div.innerHTML = `<i class="fa-solid fa-book"></i> ${bk} (${map[bk].length}篇)`;
            listEl.appendChild(div);
            map[bk].forEach(item=>createCard(item,true));
        })
    }else{
        data.forEach(item=>createCard(item,false));
    }
}
function createCard(item,hideBook){
    const div = document.createElement("div");
    div.className="novel-card";
    div.onclick = ()=>openRead(item);
    div.innerHTML = `
        ${hideBook ? "" : `<div class="card-book-tag">📚 ${item.book}</div>`}
        <div class="novel-title">${item.title}</div>
        <div class="novel-author">✍️ ${item.author}</div>
        <div class="novel-meta">📄 ${item.name}</div>
    `;
    listEl.appendChild(div);
}
function openRead(item){
    try {
        listEl.style.display="none";
        reader.style.display="block";
        rTitle.textContent = item.title;
        rMeta.innerHTML = `书籍：${item.book} &nbsp;|&nbsp; 作者：${item.author} &nbsp;|&nbsp; 文件：${item.name}`;
        if(item.name.toLowerCase().endsWith(".md")){
            contentBox.innerHTML = marked.parse(item.raw);
        }else{
            const escaped = item.raw.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/\n/g,"<br>");
            contentBox.innerHTML = `<div style="white-space:pre-wrap">${escaped}</div>`;
        }
        curPageIdx=0;
        if(readMode==="page"){
            splitPage(item.raw);
            pageCtrl.style.display="flex";
        }else{
            pageCtrl.style.display="none";
        }
    } catch (e) {
        showErr("打开阅读失败：" + e.message);
    }
}
function backToList(){
    reader.style.display="none";
    listEl.style.display="grid";
}
function font(delta){
    fontSize = Math.max(12,Math.min(32,fontSize+delta));
    contentBox.style.fontSize = fontSize + "px";
}
function setLH(val,btn){
    lineH = val;
    contentBox.style.lineHeight = lineH;
    renderModeBtn();
}
function setT(t,btn){
    theme = t;
    document.body.dataset.theme = t;
    renderModeBtn();
}
</script>
