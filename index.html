<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中梧小说</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" href="favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --bg:#f4ecd8;--card:rgba(251,246,237,0.75);--text:#5b4636;--sub:#8b7355;
    --accent:#5e72e4;--accent-light:rgba(94,114,228,0.12);--border:rgba(230,220,200,0.6);
    --shadow:0 6px 22px rgba(0,0,0,0.06);--radius-lg:24px;--radius-md:16px;--radius-pill:9999px;--blur:14px;
    --reader-bg:#fbf6ed;--reader-text:#5b4636;
}
[data-theme="light"]{--bg:#f4f6f9;--card:rgba(255,255,255,0.72);--text:#333;--sub:#666;--border:rgba(238,238,238,0.7);--reader-bg:#fff;--reader-text:#333;}
[data-theme="dark"]{--bg:#121212;--card:rgba(45,45,45,0.7);--text:#e0e0e0;--sub:#aaa;--border:rgba(68,68,68,0.6);--reader-bg:#202020;--reader-text:#d0d0d0;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:system-ui;min-height:100vh;background:var(--bg);color:var(--text);padding:16px;transition:0.35s}
.container{max-width:920px;margin:0 auto}
.top-nav{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;padding:20px 24px;margin-bottom:24px;background:var(--card);border-radius:var(--radius-lg);backdrop-filter:blur(var(--blur));box-shadow:var(--shadow);border:1px solid var(--border)}
.nav-brand h1{display:flex;align-items:center;gap:8px;font-size:1.6rem;color:var(--accent)}
.nav-links{display:flex;gap:12;flex-wrap:wrap}
.nav-links a{text-decoration:none;color:var(--sub);font-size:0.88rem;padding:9px 18px;border:1px solid var(--border);border-radius:var(--radius-pill);display:flex;gap:7px;align-items:center}
.nav-links a:hover{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(94,114,228,0.3)}
.search-bar{width:100%;margin-bottom:16px;display:flex;gap:10px}
#searchInput{flex:1;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius-pill);background:var(--card);color:var(--text);font-size:0.95rem;outline:none}
#searchBtn{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-pill);cursor:pointer}
.mode-action-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:20px}
.mode-switch{display:flex;gap:10px;align-items:center}
.mode-btn,.sort-select,.setting-btn,.theme-btn,.page-btn{
    padding:9px 18px;border:1px solid var(--border);border-radius:14px !important;
    background:transparent;color:var(--text);cursor:pointer;font-size:0.88rem;transition:0.2s
}
.mode-btn:hover,.setting-btn:hover,.theme-btn:hover,.page-btn:hover{background:var(--accent-light)}
.mode-btn.active,.setting-btn.active,.theme-btn.active,.page-btn.active{
    background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(94,114,228,0.32)
}
.action-bar{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.action-bar .btn-write,.action-bar .btn-setting{
    display:inline-flex;align-items:center;gap:8px;color:#fff;padding:13px 28px;border-radius:var(--radius-pill);text-decoration:none;font-size:0.98rem;font-weight:600;box-shadow:0 6px 16px rgba(94,114,228,0.35);border:none;cursor:pointer
}
.btn-write{background:var(--accent)}
.btn-setting{background:#7286e9}
.btn-write:hover,.btn-setting:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(94,114,228,0.42);color:#fff}
.status{text-align:center;color:var(--sub);padding:10px;margin-bottom:20px}
.loader{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:24px auto;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.novel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.book-group-title{grid-column:1/-1;margin:16px 0 8px;font-size:1.2rem;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px}
.novel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:24px;cursor:pointer;transition:transform 0.24s;backdrop-filter:blur(var(--blur))}
.novel-card:hover{transform:translateY(-6px);box-shadow:0 12px 28px rgba(0,0,0.1);border-color:var(--accent)}
.card-book-tag{font-size:0.78rem;color:var(--accent);margin-bottom:6px}
.novel-title{font-size:1.18rem;font-weight:600;margin-bottom:8px}
.novel-author{font-size:0.82rem;color:var(--sub);margin-bottom:12px}
.novel-meta{font-size:0.86rem;color:var(--sub);padding-top:12px;border-top:1px solid var(--border)}
#reader-view{display:none;background:var(--card);padding:28px;border-radius:var(--radius-lg);box-shadow:var(--shadow);backdrop-filter:blur(var(--blur));border:1px solid var(--border)}
.reader-title{font-size:1.8rem;font-weight:600;color:var(--accent);text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.reader-m{text-align:center;color:var(--sub);margin-bottom:24px;line-height:1.6}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--accent);padding:10px 20px;border-radius:14px;cursor:pointer;margin-bottom:24px;font-size:1rem}
.back-btn:hover{background:var(--accent);color:#fff}
.settings-panel{display:flex;flex-wrap:wrap;gap:12px;padding:18px 22px;background:rgba(0,0,0,0.03);border-radius:var(--radius-md);margin-bottom:28px;border:1px solid var(--border)}
.settings-panel span{color:var(--sub);font-size:0.94rem}
#content-area{line-height:1.8;word-break:break-word;padding:8px 4px;min-height:400px}
.page-control{display:flex;gap:12px;justify-content:center;align-items:center;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.page-info{color:var(--sub)}
.set-modal{
    position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:999;display:none;align-items:center;justify-content:center;
}
.set-box{
    width:92%;max-width:600px;background:var(--card);border-radius:var(--radius-lg);padding:30px;border:1px solid var(--border);box-shadow:0 10px 40px rgba(0,0,0.15)
}
.set-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.set-header h2{margin:0}
.close-set{border:none;background:transparent;font-size:1.6rem;cursor:pointer;color:var(--sub)}
.set-item{margin-bottom:20px}
.set-item label{display:block;margin-bottom:8px;color:var(--sub)}
.set-item select,.set-item input{
    width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:12px;background:transparent;color:var(--text)
}
.save-set{margin-top:20px;width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:1rem;cursor:pointer}
@media(max-width:768px){
    body{padding:12px}
    .top-nav{flex-direction:column;text-align:center}
    .mode-action-bar{flex-direction:column;align-items:stretch}
    .novel-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
    #reader-view{padding:20px 16px}
}
</style>
</head>
<body data-theme="sepia">
<div class="container">
    <nav class="top-nav">
        <div class="nav-brand"><h1><i class="fa-solid fa-book-open"></i>中梧小说</h1></div>
        <div class="nav-links">
            <a href="editor.html" target="_blank"><i class="fa-solid fa-pen"></i>云笺编辑器</a>
        </div>
    </nav>

    <div class="search-bar">
        <input id="searchInput" placeholder="搜索标题/作者/书籍/正文">
        <button id="searchBtn" onclick="doSearch()">搜索</button>
        <button class="mode-btn" onclick="resetSearch()">重置</button>
    </div>

    <div class="mode-action-bar">
        <div class="mode-switch">
            <button class="mode-btn active" onclick="switchView('book')">📚 书籍模式</button>
            <button class="mode-btn" onclick="switchView('chapter')">📑 所有篇章</button>
            <select class="sort-select" id="sortType">
                <option value="custom">自定义排序（sort.json 默认）</option>
                <option value="name">文件名升序</option>
                <option value="time">修改时间倒序</option>
            </select>
        </div>
        <div class="action-bar">
            <a href="editor.html" target="_blank" class="btn-write"><i class="fa-solid fa-pen-to-square"></i>写小说</a>
            <button class="btn-setting" onclick="openSetModal()"><i class="fa-solid fa-cog"></i>全局设置</button>
        </div>
    </div>

    <div id="status-msg" class="status">正在加载书架...</div>
    <div id="loader" class="loader"></div>
    <div id="novel-list" class="novel-grid"></div>

    <div id="reader-view">
        <button class="back-btn" onclick="backToList()">← 返回书架</button>
        <h2 class="reader-title" id="r-title"></h2>
        <div class="reader-m" id="r-meta"></div>
        <div class="settings-panel">
            <span>阅读模式：</span>
            <button class="setting-btn active" data-read="scroll" onclick="switchReadMode('scroll',this)">完整滚动</button>
            <button class="setting-btn" data-read="page" onclick="switchReadMode('page',this)">分页阅读</button>
            <span style="margin-left:10px">单页字数</span>
            <input type="number" id="pageWord" value="1200" min="400" max="3000" style="width:90px">
            <span style="margin-left:10px">字号</span>
            <button class="setting-btn" onclick="font(-2)">A-</button>
            <button class="setting-btn" onclick="font(2)">A+</button>
            <span style="margin-left:10px">行距</span>
            <button class="setting-btn lh" data-lh="1.5" onclick="setLH(1.5,this)">紧凑</button>
            <button class="setting-btn lh active" data-lh="1.8" onclick="setLH(1.8,this)">适中</button>
            <button class="setting-btn lh" data-lh="2.2" onclick="setLH(2.2,this)">宽松</button>
            <span style="margin-left:10px">主题</span>
            <button class="theme-btn" data-t="light" onclick="setT('light',this)">☀日间</button>
            <button class="theme-btn active" data-t="sepia" onclick="setT('sepia',this)">📖护眼</button>
            <button class="theme-btn" data-t="dark" onclick="setT('dark',this)">🌙夜间</button>
        </div>
        <div id="content-area"></div>
        <div class="page-control" id="pageCtrl" style="display:none">
            <button class="page-btn" onclick="prevPage()">上一页</button>
            <span class="page-info">第 <span id="curPage">1</span> / <span id="totalPage">1</span> 页</span>
            <button class="page-btn" onclick="nextPage()">下一页</button>
        </div>
    </div>
</div>

<div class="set-modal" id="setModal">
    <div class="set-box">
        <div class="set-header">
            <h2>全局阅读设置</h2>
            <button class="close-set" onclick="closeSetModal()">×</button>
        </div>
        <div class="set-item">
            <label>默认字号</label>
            <select id="defFont">
                <option value="14">14px</option>
                <option value="16">16px</option>
                <option value="18" selected>18px</option>
                <option value="20">20px</option>
                <option value="22">22px</option>
            </select>
        </div>
        <div class="set-item">
            <label>默认行距</label>
            <select id="defLH">
                <option value="1.5">紧凑 1.5</option>
                <option value="1.8" selected>适中 1.8</option>
                <option value="2.2">宽松 2.2</option>
            </select>
        </div>
        <div class="set-item">
            <label>默认阅读主题</label>
            <select id="defTheme">
                <option value="light">日间</option>
                <option value="sepia" selected>护眼</option>
                <option value="dark">夜间</option>
            </select>
        </div>
        <div class="set-item">
            <label>默认排序方式</label>
            <select id="defSort">
                <option value="custom" selected>自定义sort.json</option>
                <option value="name">文件名升序</option>
                <option value="time">修改时间倒序</option>
            </select>
        </div>
        <div class="set-item">
            <label>默认视图</label>
            <select id="defView">
                <option value="book" selected>书籍模式</option>
                <option value="chapter">所有篇章</option>
            </select>
        </div>
        <div class="set-item">
            <label>分页默认字数</label>
            <input id="defWord" type="number" min="400" max="3000" value="1200">
        </div>
        <button class="save-set" onclick="saveGlobalSet()">保存默认设置</button>
    </div>
</div>

<script>
const GH_USER = "Youreln";
const GH_REPO = "novel";
const GH_API = "https://api.github.com/repos";
let allNovel = [];
let filterNovel = [];
let sortOrder = [];
let viewMode = "book";
let sortMode = "custom";
let fontSize = 18;
let lineH = 1.8;
let theme = "sepia";
let readMode = "scroll";
let pageWord = 1200;
let pageList = [];
let curPageIdx = 0;

const globalSet = JSON.parse(localStorage.getItem("novelGlobalSet")) || {
    defFont:18,defLH:1.8,defTheme:"sepia",defSort:"custom",defView:"book",defWord:1200
};

const listEl = document.getElementById("novel-list");
const status = document.getElementById("status-msg");
const loader = document.getElementById("loader");
const reader = document.getElementById("reader-view");
const contentBox = document.getElementById("content-area");
const rTitle = document.getElementById("r-title");
const rMeta = document.getElementById("r-meta");
const sortSel = document.getElementById("sortType");
const searchInput = document.getElementById("searchInput");
const setModal = document.getElementById("setModal");
const pageCtrl = document.getElementById("pageCtrl");
const curPageDom = document.getElementById("curPage");
const totalPageDom = document.getElementById("totalPage");
const pageWordInput = document.getElementById("pageWord");

window.onload = ()=>{
    fontSize = globalSet.defFont;
    lineH = globalSet.defLH;
    theme = globalSet.defTheme;
    sortMode = globalSet.defSort;
    viewMode = globalSet.defView;
    pageWord = globalSet.defWord;
    pageWordInput.value = pageWord;
    sortSel.value = sortMode;

    document.getElementById("defFont").value = globalSet.defFont;
    document.getElementById("defLH").value = globalSet.defLH;
    document.getElementById("defTheme").value = globalSet.defTheme;
    document.getElementById("defSort").value = globalSet.defSort;
    document.getElementById("defView").value = globalSet.defView;
    document.getElementById("defWord").value = globalSet.defWord;

    document.body.dataset.theme = theme;
    contentBox.style.fontSize = fontSize + "px";
    contentBox.style.lineHeight = lineH;
    bindSortChange();
    bindSearchEnter();
    renderModeBtn();
    loadAllData();
}
function bindSortChange(){
    sortSel.onchange = ()=>{
        sortMode = sortSel.value;
        render();
    }
}
function bindSearchEnter(){
    searchInput.addEventListener("keydown",e=>e.key==="Enter"&&doSearch())
}
function renderModeBtn(){
    document.querySelectorAll(".mode-btn").forEach(b=>b.classList.toggle("active",b.onclick.includes(viewMode)));
    document.querySelectorAll(".setting-btn[data-read]").forEach(b=>b.classList.toggle("active",b.dataset.read===readMode));
    document.querySelectorAll(".lh").forEach(b=>b.classList.toggle("active",+b.dataset.lh===lineH));
    document.querySelectorAll(".theme-btn").forEach(b=>b.classList.toggle("active",b.dataset.t===theme));
}
function openSetModal(){setModal.style.display="flex"}
function closeSetModal(){setModal.style.display="none"}
function saveGlobalSet(){
    const s = {
        defFont:+document.getElementById("defFont").value,
        defLH:+document.getElementById("defLH").value,
        defTheme:document.getElementById("defTheme").value,
        defSort:document.getElementById("defSort").value,
        defView:document.getElementById("defView").value,
        defWord:+document.getElementById("defWord").value
    };
    localStorage.setItem("novelGlobalSet",JSON.stringify(s));
    alert("默认设置保存成功，刷新页面生效");
    closeSetModal();
}
function switchReadMode(mode,btn){
    readMode = mode;
    renderModeBtn();
    if(mode==="page"){
        splitPage(contentBox.innerText || contentBox.innerHTML);
        pageCtrl.style.display="flex";
    }else{
        pageCtrl.style.display="none";
        curPageIdx=0;
    }
}
function splitPage(rawText){
    const wordNum = +pageWordInput.value;
    pageWord = wordNum;
    pageList = [];
    let temp = "";
    let count = 0;
    for(let c of rawText){
        temp += c;
        if(/\s/.test(c)) count++;
        else count++;
        if(count >= wordNum){
            pageList.push(temp);
            temp = "";count=0;
        }
    }
    if(temp) pageList.push(temp);
    curPageIdx = 0;
    renderPage();
}
function renderPage(){
    if(pageList.length===0){contentBox.innerText="暂无内容";return}
    contentBox.innerText = pageList[curPageIdx];
    curPageDom.textContent = curPageIdx+1;
    totalPageDom.textContent = pageList.length;
}
function prevPage(){
    if(curPageIdx>0){curPageIdx--;renderPage()}
}
function nextPage(){
    if(curPageIdx < pageList.length-1){curPageIdx++;renderPage()}
}
async function scanAll(path){
    const res = await fetch(`${GH_API}/${GH_USER}/${GH_REPO}/contents/${path}`);
    if(!res.ok) return [];
    const arr = await res.json();
    let out = [];
    for(let item of arr){
        const p = decodeURIComponent(item.path);
        const n = decodeURIComponent(item.name);
        if(item.type === "dir") out = out.concat(await scanAll(p));
        else if(item.type==="file" && n!=="sort.json" && /\.(md|txt)$/i.test(n)){
            out.push({path:p,name:n,download:item.download_url,modified:item.modified||"1970-01-01T00:00:00Z"})
        }
    }
    return out;
}
function parseMeta(raw,filePath){
    const reg = /<!-- ZW_META:\s*(\{[\s\S]*?\})\s* -->/;
    const m = raw.match(reg);
    let meta = {title:"",author:"",book:""};
    if(m) try{meta=JSON.parse(m[1])}catch{}
    const seg = filePath.replace("novel/","").split("/");
    const pathBook = seg.length>=2 ? seg[0] : "未分类";
    if(!meta.book) meta.book = pathBook;
    return meta;
}
async function loadAllData(){
    loader.style.display = "block";
    status.textContent = "读取sort.json";
    try{
        const sRes = await fetch(`${GH_API}/${GH_USER}/${GH_REPO}/contents/novel/sort.json`);
        if(sRes.ok){
            const d = await sRes.json();
            let raw = decodeURIComponent(escape(atob(d.content)));
            sortOrder = JSON.parse(raw).order.map(x=>decodeURIComponent(x));
        }
    }catch{sortOrder=[]}
    status.textContent = "扫描小说";
    const files = await scanAll("novel");
    allNovel = [];
    for(let f of files){
        const txt = await (await fetch(f.download_url)).text();
        const meta = parseMeta(txt,f.path);
        const pure = txt.replace(/<!-- ZW_META:[\s\S]*? -->\n\n/,"");
        allNovel.push({
            path:f.path,name:f.name,url:f.download_url,title:meta.title||f.name.replace(/\.(md|txt)$/,""),
            author:meta.author||"未知作者",book:meta.book,raw:pure,modified:new Date(f.modified).getTime()
        })
    }
    filterNovel = [...allNovel];
    loader.style.display = "none";
    status.style.display = "none";
    render();
}
function switchView(mode){
    viewMode = mode;
    renderModeBtn();
    render();
}
function doSearch(){
    const key = searchInput.value.trim().toLowerCase();
    if(!key){filterNovel=[...allNovel];render();return}
    filterNovel = allNovel.filter(item=>{
        const t=item.title.toLowerCase(),a=item.author.toLowerCase(),b=item.book.toLowerCase(),c=item.raw.toLowerCase();
        return t.includes(key)||a.includes(key)||b.includes(key)||c.includes(key)
    });
    render();
}
function resetSearch(){searchInput.value="";filterNovel=[...allNovel];render()}
function render(){
    listEl.innerHTML = "";
    let data = [...filterNovel];
    if(sortMode==="custom"){
        const ord=[],rest=[];
        sortOrder.forEach(p=>{const i=data.find(x=>x.path===p);if(i)ord.push(i)});
        data.forEach(x=>{if(!ord.find(i=>i.path===x.path))rest.push(x)});
        data = [...ord,...rest];
    }else if(sortMode==="name") data.sort((a,b)=>a.name.localeCompare(b.name));
    else if(sortMode==="time") data.sort((a,b)=>b.modified - a.modified);
    if(data.length===0){
        listEl.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--sub)">无匹配小说</div>`;
        return;
    }
    if(viewMode==="book"){
        const map = {};
        data.forEach(i=>{if(!map[i.book])map[i.book]=[];map[i.book].push(i)});
        Object.keys(map).forEach(bk=>{
            const div = document.createElement("div");
            div.className="book-group-title";
            div.innerHTML = `<i class="fa-solid fa-book"></i> ${bk}`;
            listEl.appendChild(div);
            map[bk].forEach(item=>createCard(item,true));
        })
    }else data.forEach(item=>createCard(item,false));
}
function createCard(item,hideBook){
    const div = document.createElement("div");
    div.className="novel-card";
    div.onclick = ()=>openRead(item);
    div.innerHTML = `
        ${hideBook ? "" : `<div class="card-book-tag">书籍：${item.book}</div>`}
        <div class="novel-title">${item.title}</div>
        <div class="novel-author">作者：${item.author}</div>
        <div class="novel-meta">${item.name}</div>
    `;
    listEl.appendChild(div);
}
function openRead(item){
    listEl.style.display="none";
    reader.style.display="block";
    rTitle.textContent = item.title;
    rMeta.innerHTML = `书籍：${item.book} &nbsp;|&nbsp; 作者：${item.author}`;
    const text = /\.md$/i.test(item.name) ? marked.parse(item.raw) : `<pre style="white-space:pre-wrap">${item.raw.replace(/&/g,"&amp;")}</pre>`;
    contentBox.innerHTML = text;
    curPageIdx=0;
    if(readMode==="page"){splitPage(item.raw);pageCtrl.style.display="flex"}else pageCtrl.style.display="none";
}
function backToList(){reader.style.display="none";listEl.style.display="grid"}
function font(delta){
    fontSize = Math.max(12,Math.min(32,fontSize+delta));
    contentBox.style.fontSize = fontSize+"px";
}
function setLH(val,btn){
    lineH = val;
    contentBox.style.lineHeight = val;
    renderModeBtn();
}
function setT(t,btn){
    theme = t;
    document.body.dataset.theme = t;
    renderModeBtn();
}
</script>
</body>
</html>
